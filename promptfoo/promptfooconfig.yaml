# ═══════════════════════════════════════════════════════════════════════════════
#  VerificAI — PromptFoo Test Suite v1.0
# ═══════════════════════════════════════════════════════════════════════════════
#  SETUP:
#    pip install promptfoo google-generativeai
#    export GEMINI_API_KEY=la_tua_chiave
#    export VERIFICAI_ROOT=/percorso/al/progetto   (dove sta prompts.py)
#
#  USO:
#    cd promptfoo/
#    promptfoo eval                                → tutti i test
#    promptfoo eval -j 1                           → sequenziale (meno API calls)
#    promptfoo eval --filter-description "Titolo"  → solo test titolo
#    promptfoo view                                → apri risultati nel browser
# ═══════════════════════════════════════════════════════════════════════════════

description: "VerificAI — Test Suite Prompt AI v1.0"

defaultTest:
  options:
    provider: file://providers/verificai_provider.py
    timeout: 120000


evaluateOptions:
  maxConcurrency: 1

defaultTest:
  options:
    timeout: 120000
    rubricProvider: openai:chat:gpt-4o-mini

    
providers:
  - id: file://providers/verificai_provider.py
    label: "VerificAI (Gemini Flash Lite)"
    config:
      model_id: "gemini-2.5-flash-lite"
      temperature: 0.7

prompts:
  - file://prompts/verificai.txt

defaultTest:
  options:
    timeout: 120000

tests:
  # ── TITOLI ────────────────────────────────────────────────────────────────
  - description: "[Titolo] Matematica derivate"
    vars: { prompt_type: titolo, materia: Matematica, argomento: "le derivate" }
    assert:
      - type: not-icontains
        value: "Verifica di"
      - type: not-contains
        value: '"'
      - type: javascript
        value: "output.trim().length < 80 && output.trim().length > 3"
      - type: javascript
        value: "!output.trim().endsWith('.')"

  - description: "[Titolo] Corregge errore ortografico"
    vars: { prompt_type: titolo, materia: Storia, argomento: "la rivoluzzione francese" }
    assert:
      - type: not-icontains
        value: "rivoluzzione"
      - type: icontains
        value: "Rivoluzione"

  - description: "[Titolo] Inglese conciso"
    vars: { prompt_type: titolo, materia: Inglese, argomento: "present perfect e past simple" }
    assert:
      - type: javascript
        value: "output.trim().length < 80 && output.trim().length > 5"

  # ── CORPO: STRUTTURA LATEX ────────────────────────────────────────────────
  - description: "[Corpo] Mat Derivate LS — struttura+punteggi"
    vars:
      prompt_type: corpo
      materia: Matematica
      argomento: Derivate
      livello: Liceo Scientifico
      durata: "60 minuti"
      num_esercizi: 5
      punti_totali: 100
      mostra_punteggi: true
      con_griglia: true
      e_mat: true
    assert:
      - type: contains
        value: "\\subsection*"
      - type: contains
        value: "\\end{document}"
      - type: not-contains
        value: "\\documentclass"
      - type: not-contains
        value: "\\begin{document}"
      - type: javascript
        value: "(output.match(/\\\\subsection\\*/g) || []).length === 5"
        metric: esercizi_count
      - type: javascript
        value: "(output.match(/\\(\\d+ pt\\)/g) || []).length >= 5"
        metric: punteggi_count
      - type: javascript
        value: |
          const m = output.match(/\((\d+) pt\)/g) || [];
          const s = m.reduce((a, x) => a + parseInt(x.match(/\d+/)[0]), 0);
          s >= 90 && s <= 110;
        metric: somma_punti
      - type: not-icontains
        value: "\\includegraphics{placeholder}"
      - type: not-icontains
        value: "% qui andrebbe"
      - type: not-icontains
        value: "la risposta è"
      - type: not-icontains
        value: "generato con TikZ"
      # Validazione strutturale LaTeX (brackets, ambienti) - solo javascript

  - description: "[Corpo] Italiano Medie — livello adeguato"
    vars:
      prompt_type: corpo
      materia: Italiano
      argomento: "Analisi del periodo"
      livello: "Scuola Secondaria I grado (Medie)"
      durata: "45 minuti"
      num_esercizi: 4
      punti_totali: 80
      mostra_punteggi: true
      con_griglia: false
      e_mat: false
    assert:
      - type: javascript
        value: "(output.match(/\\\\subsection\\*/g) || []).length === 4"
      - type: javascript
        value: "(output.match(/\\(\\d+ pt\\)/g) || []).length >= 4"
      - type: javascript
        value: |
          // Verifica livello linguistico appropriato per medie (11-14 anni)
          const words = output.toLowerCase().split(/\s+/);
          const complexWords = words.filter(w => w.length > 8 || /mente|zione|sione/.test(w));
          const sentences = output.split(/[.!?]+/).filter(s => s.trim().length > 0);
          const avgSentenceLength = sentences.reduce((sum, s) => sum + s.split(/\s+/).length, 0) / sentences.length;
          return complexWords.length <= 5 && avgSentenceLength <= 15;
        metric: livello_medie_appropriato

  - description: "[Corpo] Fisica SENZA punteggi"
    vars:
      prompt_type: corpo
      materia: Fisica
      argomento: "Leggi di Newton"
      livello: Liceo Scientifico
      durata: "50 minuti"
      num_esercizi: 3
      punti_totali: 0
      mostra_punteggi: false
      con_griglia: false
      e_mat: true
    assert:
      - type: javascript
        value: "(output.match(/\\\\subsection\\*/g) || []).length === 3"
      - type: javascript
        value: "(output.match(/\\(\\d+ pt\\)/g) || []).length === 0"
        metric: zero_punteggi

  # ── REGOLE SPECIFICHE ─────────────────────────────────────────────────────
  - description: "[Regola] Anti-spoiler grafici"
    vars:
      prompt_type: corpo
      materia: Matematica
      argomento: "Studio di funzione con rappresentazione grafica"
      livello: Liceo Scientifico
      durata: "90 minuti"
      num_esercizi: 3
      punti_totali: 100
      mostra_punteggi: true
      con_griglia: true
      e_mat: true
    assert:
      - type: javascript
        value: |
          // Anti-spoiler: verifica che in richieste di disegno non ci sia TikZ
          const hasDrawingPrompt = /disegnare|rappresentare.*grafic|tracciare.*grafic|disegna.*funzione/i.test(output);
          const hasTikZ = /tikzpicture|pgfplots|\\begin\{tikz/ig.test(output);
          return !hasDrawingPrompt || !hasTikZ;
        metric: anti_spoiler_grafici

  - description: "[Regola] LaTeX brackets bilanciati"
    vars:
      prompt_type: corpo
      materia: Matematica
      argomento: "Equazioni e sistemi"
      livello: "Istituto Tecnico Tecnologico/Industriale"
      durata: "50 minuti"
      num_esercizi: 4
      punti_totali: 80
      mostra_punteggi: true
      con_griglia: false
      e_mat: true
    assert:
      - type: javascript
        value: |
          const c = output.replace(/\\[{}]/g, '');
          let d = 0;
          for (const ch of c) { if (ch==='{') d++; if (ch==='}') d--; if (d<0) return false; }
          return d === 0;
        metric: brackets_ok
      - type: javascript
        value: |
          const o = (output.match(/\\begin\{enumerate\}/g)||[]).length;
          const c = (output.match(/\\end\{enumerate\}/g)||[]).length;
          return o === c;
        metric: enumerate_ok

  - description: "[Regola] Varietà tipologie 6 esercizi"
    vars:
      prompt_type: corpo
      materia: Storia
      argomento: "La Prima Guerra Mondiale"
      livello: Liceo Scientifico
      durata: "50 minuti"
      num_esercizi: 6
      punti_totali: 100
      mostra_punteggi: true
      con_griglia: true
      e_mat: false
    assert:
      - type: javascript
        value: "(output.match(/\\\\subsection\\*/g) || []).length === 6"
      - type: javascript
        value: |
          // Verifica varietà tipologie (almeno 2 diverse tra aperte, multiple, vero/falso, completamento)
          const hasOpen = /\?[^\?]*$/m.test(output) || /spiega|descrivi|motiva|analizza/i.test(output);
          const hasMultiple = /\([^)]*\)[^)]*\([^)]*\)/.test(output) || /a\)|b\)|c\)|d\)/i.test(output);
          const hasTrueFalse = /vero|falso|V|F\s*\)/i.test(output) || /\\(V|F\)/i.test(output);
          const hasCompletion = /___|\.{3,}|completa|riempi/i.test(output);
          const types = [hasOpen, hasMultiple, hasTrueFalse, hasCompletion].filter(Boolean).length;
          return types >= 2;
        metric: varieta_tipologie

  # ── CALIBRAZIONE LIVELLI ──────────────────────────────────────────────────
  - description: "[Calibrazione] Professionale semplice"
    vars:
      prompt_type: corpo
      materia: Matematica
      argomento: "Equazioni di primo grado"
      livello: Istituto Professionale
      durata: "45 minuti"
      num_esercizi: 4
      punti_totali: 80
      mostra_punteggi: true
      con_griglia: false
      e_mat: true
    assert:
      - type: javascript
        value: "(output.match(/\\\\subsection\\*/g) || []).length === 4"
      - type: javascript
        value: |
          // Verifica semplicità per Istituto Professionale
          const sentences = output.split(/[.!?]+/).filter(s => s.trim().length > 0);
          const avgSentenceLength = sentences.reduce((sum, s) => sum + s.split(/\s+/).length, 0) / sentences.length;
          const complexWords = output.toLowerCase().match(/\b[a-z]{10,}\b/g) || [];
          const abstractConcepts = /(teorema|postulato|assioma|ipotesi|dimostrazione)/i.test(output);
          return avgSentenceLength <= 18 && complexWords.length <= 3 && !abstractConcepts;
        metric: livello_professionale

  - description: "[Calibrazione] Primaria 6-11 anni"
    vars:
      prompt_type: corpo
      materia: Matematica
      argomento: "Le frazioni"
      livello: "Scuola Primaria (Elementari)"
      durata: "30 minuti"
      num_esercizi: 3
      punti_totali: 60
      mostra_punteggi: true
      con_griglia: false
      e_mat: false
    assert:
      - type: javascript
        value: "(output.match(/\\\\subsection\\*/g) || []).length === 3"
      - type: javascript
        value: |
          // Verifica linguaggio primaria (6-11 anni): frasi brevi, concreto, quotidiano
          const sentences = output.split(/[.!?]+/).filter(s => s.trim().length > 0);
          const avgSentenceLength = sentences.reduce((sum, s) => sum + s.split(/\s+/).length, 0) / sentences.length;
          const simpleWords = /(mela|gatto|scuola|casa|gioco|numero|conta|aggiungi|togli)/i.test(output);
          const complexTerms = /(derivata|integrale|teorema|algoritmo|funzione)/i.test(output);
          return avgSentenceLength <= 12 && simpleWords && !complexTerms;
        metric: livello_primaria

  # ── CONTROLLO QUALITÀ ─────────────────────────────────────────────────────
  - description: "[QA] Corregge errore matematico"
    vars:
      prompt_type: qa
      materia: Matematica
      livello: Liceo Scientifico
      mostra_punteggi: true
      punti_totali: 100
      corpo_latex: |
        \subsection*{Esercizio 1: Equazioni}
        \begin{enumerate}[a)]
        \item[a)] Risolvi $x^2 + 1 = 0$ in $\mathbb{R}$. (10 pt)
        \item[b)] Trova le soluzioni di $2x - 6 = 0$. (10 pt)
        \end{enumerate}
        \subsection*{Esercizio 2: Disequazioni}
        \begin{enumerate}[a)]
        \item[a)] Risolvi $x^2 - 4 > 0$. (15 pt)
        \end{enumerate}
        \end{document}
    assert:
      - type: contains
        value: "\\subsection*"
      - type: contains
        value: "\\end{document}"
      - type: javascript
        value: |
          // Verifica che corregga almeno un problema: x²+1=0 in R (impossibile) o punteggio sbagliato
          const hasImpossibleCorrection = /impossibile|nessuna soluzione|non.*soluzione|vuoto/i.test(output);
          const hasScoreCorrection = /punteggi|somma|totale.*100|35.*100/i.test(output);
          const hasAnyCorrection = hasImpossibleCorrection || hasScoreCorrection;
          return hasAnyCorrection;
        metric: correzione_problemi
